# ─────────────────────────────────────────────────────────────────────────────
# k8s/service.yaml
# Kubernetes Service — exposes the pods to the outside world
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: zomato-dashboard-service
spec:
  selector:
    app: zomato-dashboard           # must match Deployment labels
  ports:
    - protocol: TCP
      port: 80                      # external port (internet sees port 80)
      targetPort: 5000              # pod internal port
  type: LoadBalancer                # use NodePort if running on Minikube
