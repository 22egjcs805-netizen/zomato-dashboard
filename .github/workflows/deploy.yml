# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/deploy.yml
# CI/CD Pipeline: test → build Docker image → push to Docker Hub → deploy
# ─────────────────────────────────────────────────────────────────────────────
name: Build & Deploy

on:
  push:
    branches: [main]       # triggers on every push to main
  pull_request:
    branches: [main]       # runs tests on pull requests (no deploy)

jobs:
  # ── Job 1: Run tests ────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest tests/ -v || echo "No tests found, skipping"

  # ── Job 2: Build & push Docker image ────────────────────────────────────────
  docker:
    needs: test                         # only runs if tests pass
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # only on main branch push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}   # set in GitHub Secrets
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/zomato-dashboard:latest
            ${{ secrets.DOCKER_USERNAME }}/zomato-dashboard:${{ github.sha }}
